<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <title>Mauri — app icon 1024x1024</title>
  <desc>Mauri app icon: deep teal rounded square with the spine of life mark in soft teal, purple, and amber. For Play Store and App Store submission.</desc>

  <!-- Background — rounded square per store guidelines -->
  <rect width="1024" height="1024" rx="220" fill="#1D9E75"/>

  <!-- Subtle inner glow ring — very soft -->
  <rect x="24" y="24" width="976" height="976" rx="200"
        fill="none" stroke="#085041" stroke-width="1.5" opacity="0.4"/>

  <!-- Mark — centred, scaled up -->
  <g transform="translate(512, 512) scale(3.2) translate(-100, -152)">
    <!-- Spine -->
    <line x1="100" y1="20" x2="100" y2="272"
          stroke="#E1F5EE" stroke-width="3.5" stroke-linecap="round"/>

    <!-- Upper teal branches -->
    <path d="M100,52 Q148,34 162,14"
          stroke="#E1F5EE" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M100,52 Q56,36 44,16"
          stroke="#E1F5EE" stroke-width="1.8" fill="none" stroke-linecap="round" opacity="0.45"/>
    <path d="M100,98 Q152,76 170,52"
          stroke="#E1F5EE" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M100,98 Q50,78 34,54"
          stroke="#E1F5EE" stroke-width="1.8" fill="none" stroke-linecap="round" opacity="0.4"/>

    <!-- Mid purple branches -->
    <path d="M100,148 Q146,128 158,108"
          stroke="#CECBF6" stroke-width="2.6" fill="none" stroke-linecap="round"/>
    <path d="M100,148 Q56,130 46,110"
          stroke="#CECBF6" stroke-width="1.6" fill="none" stroke-linecap="round" opacity="0.5"/>
    <path d="M100,192 Q136,178 144,164"
          stroke="#CECBF6" stroke-width="2.2" fill="none" stroke-linecap="round" opacity="0.78"/>
    <path d="M100,192 Q66,179 60,166"
          stroke="#CECBF6" stroke-width="1.3" fill="none" stroke-linecap="round" opacity="0.42"/>
    <path d="M100,232 Q124,222 128,212"
          stroke="#CECBF6" stroke-width="1.6" fill="none" stroke-linecap="round" opacity="0.55"/>

    <!-- Amber trace -->
    <path d="M100,256 Q116,249 118,240"
          stroke="#FAC775" stroke-width="1.6" fill="none" stroke-linecap="round" opacity="0.72"/>
    <path d="M100,256 Q86,250 84,242"
          stroke="#FAC775" stroke-width="1.1" fill="none" stroke-linecap="round" opacity="0.42"/>

    <!-- Root circle -->
    <circle cx="100" cy="284" r="18" fill="#E1F5EE"/>
    <circle cx="100" cy="284" r="10" fill="#1D9E75"/>
  </g>
</svg>
