<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 480" width="960" height="480">
  <title>Mauri — app UI icon set</title>
  <desc>Eight icons for the Mauri app modules: protocol, lab markers, period tracker, supplement, diet, voice check-in, milestone, and community. All 24x24 on 80x80 tiles at 2x scale.</desc>

  <defs>
    <style>
      .tile-label {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
        font-size: 13px;
        fill: #888780;
        text-anchor: middle;
      }
    </style>
  </defs>

  <!-- === ROW 1 === -->

  <!-- 1. Protocol / Clear Path -->
  <g transform="translate(40, 40)">
    <rect width="100" height="100" rx="20" fill="#E1F5EE"/>
    <g transform="translate(50,50) scale(1.8) translate(-12,-12)">
      <!-- Vertical path with nodes -->
      <line x1="12" y1="2" x2="12" y2="22" stroke="#1D9E75" stroke-width="1.6" stroke-linecap="round"/>
      <circle cx="12" cy="5"  r="2.5" fill="#1D9E75"/>
      <circle cx="12" cy="12" r="2.5" fill="#7F77DD"/>
      <circle cx="12" cy="19" r="2.5" fill="#EF9F27"/>
      <!-- Tick marks -->
      <line x1="14.5" y1="5"  x2="18" y2="5"  stroke="#1D9E75" stroke-width="1.2" stroke-linecap="round"/>
      <line x1="14.5" y1="12" x2="18" y2="12" stroke="#7F77DD" stroke-width="1.2" stroke-linecap="round"/>
      <line x1="14.5" y1="19" x2="18" y2="19" stroke="#EF9F27" stroke-width="1.2" stroke-linecap="round"/>
    </g>
    <text x="50" y="118" class="tile-label">your protocol</text>
  </g>

  <!-- 2. Lab Markers / HOMA-IR -->
  <g transform="translate(160, 40)">
    <rect width="100" height="100" rx="20" fill="#E1F5EE"/>
    <g transform="translate(50,50) scale(1.8) translate(-12,-12)">
      <!-- Flask shape -->
      <path d="M9,3 L9,12 L4,20 Q4,22 8,22 L16,22 Q20,22 20,20 L15,12 L15,3 Z"
            stroke="#1D9E75" stroke-width="1.5" fill="#E1F5EE" stroke-linejoin="round"/>
      <!-- Liquid level -->
      <path d="M6,17 Q12,15 18,17 L16,22 L8,22 Z"
            fill="#1D9E75" opacity="0.35"/>
      <!-- Bubble -->
      <circle cx="13" cy="19" r="1.2" fill="#1D9E75" opacity="0.7"/>
      <!-- Cap line -->
      <line x1="7" y1="4" x2="17" y2="4" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round"/>
    </g>
    <text x="50" y="118" class="tile-label">lab markers</text>
  </g>

  <!-- 3. Period Tracker -->
  <g transform="translate(280, 40)">
    <rect width="100" height="100" rx="20" fill="#FBEAF0"/>
    <g transform="translate(50,50) scale(1.8) translate(-12,-12)">
      <!-- Calendar outline -->
      <rect x="2" y="4" width="20" height="18" rx="2"
            stroke="#D4537E" stroke-width="1.5" fill="none"/>
      <!-- Header bar -->
      <rect x="2" y="4" width="20" height="5" rx="2"
            fill="#D4537E" opacity="0.2"/>
      <!-- Calendar pins -->
      <line x1="7"  y1="2" x2="7"  y2="6" stroke="#D4537E" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="17" y1="2" x2="17" y2="6" stroke="#D4537E" stroke-width="1.5" stroke-linecap="round"/>
      <!-- Day dots -->
      <circle cx="7"  cy="13" r="1.5" fill="#D4537E"/>
      <circle cx="12" cy="13" r="1.5" fill="#D4537E" opacity="0.4"/>
      <circle cx="17" cy="13" r="1.5" fill="#D4537E" opacity="0.4"/>
      <circle cx="7"  cy="18" r="1.5" fill="#D4537E" opacity="0.4"/>
      <circle cx="12" cy="18" r="1.5" fill="#ED93B1"/>
    </g>
    <text x="50" y="118" class="tile-label">period tracker</text>
  </g>

  <!-- 4. Supplements -->
  <g transform="translate(400, 40)">
    <rect width="100" height="100" rx="20" fill="#E1F5EE"/>
    <g transform="translate(50,50) scale(1.8) translate(-12,-12)">
      <!-- Capsule -->
      <rect x="3" y="9" width="18" height="6" rx="3"
            stroke="#1D9E75" stroke-width="1.5" fill="none"/>
      <!-- Left half fill -->
      <path d="M3,12 Q3,9 6,9 L12,9 L12,15 L6,15 Q3,15 3,12 Z"
            fill="#1D9E75" opacity="0.25"/>
      <!-- Centre divider -->
      <line x1="12" y1="9" x2="12" y2="15" stroke="#1D9E75" stroke-width="1" opacity="0.4"/>
      <!-- Bottle above -->
      <rect x="9" y="2" width="6" height="7" rx="1.5"
            stroke="#1D9E75" stroke-width="1.2" fill="none"/>
      <rect x="10" y="1" width="4" height="2" rx="0.8"
            fill="#1D9E75" opacity="0.5"/>
      <!-- Plus sign -->
      <line x1="12" y1="4" x2="12" y2="7" stroke="#1D9E75" stroke-width="1.2" stroke-linecap="round"/>
      <line x1="10.5" y1="5.5" x2="13.5" y2="5.5" stroke="#1D9E75" stroke-width="1.2" stroke-linecap="round"/>
      <!-- Dots below -->
      <circle cx="8"  cy="20" r="1.2" fill="#EF9F27"/>
      <circle cx="12" cy="20" r="1.2" fill="#7F77DD"/>
      <circle cx="16" cy="20" r="1.2" fill="#1D9E75"/>
    </g>
    <text x="50" y="118" class="tile-label">supplements</text>
  </g>

  <!-- 5. Diet Plan -->
  <g transform="translate(520, 40)">
    <rect width="100" height="100" rx="20" fill="#EAF3DE"/>
    <g transform="translate(50,50) scale(1.8) translate(-12,-12)">
      <!-- Plate circle -->
      <circle cx="12" cy="13" r="8.5" stroke="#639922" stroke-width="1.5" fill="none"/>
      <!-- Food sections -->
      <path d="M12,13 L12,5 A8.5,8.5 0 0,1 19.5,17 Z"
            fill="#639922" opacity="0.2"/>
      <path d="M12,13 L19.5,17 A8.5,8.5 0 0,1 4.5,17 Z"
            fill="#3B6D11" opacity="0.2"/>
      <path d="M12,13 L4.5,17 A8.5,8.5 0 0,1 12,5 Z"
            fill="#97C459" opacity="0.2"/>
      <!-- Dividers -->
      <line x1="12" y1="13" x2="12"   y2="4.5"  stroke="#639922" stroke-width="1" opacity="0.5"/>
      <line x1="12" y1="13" x2="19.5" y2="17"   stroke="#639922" stroke-width="1" opacity="0.5"/>
      <line x1="12" y1="13" x2="4.5"  y2="17"   stroke="#639922" stroke-width="1" opacity="0.5"/>
      <!-- Fork -->
      <line x1="4" y1="2" x2="4" y2="7" stroke="#639922" stroke-width="1.2" stroke-linecap="round"/>
      <line x1="3" y1="2" x2="3" y2="4" stroke="#639922" stroke-width="1" stroke-linecap="round"/>
      <line x1="5" y1="2" x2="5" y2="4" stroke="#639922" stroke-width="1" stroke-linecap="round"/>
    </g>
    <text x="50" y="118" class="tile-label">diet plan</text>
  </g>

  <!-- 6. Voice Check-in (Whisper) -->
  <g transform="translate(640, 40)">
    <rect width="100" height="100" rx="20" fill="#EEEDFE"/>
    <g transform="translate(50,50) scale(1.8) translate(-12,-12)">
      <!-- Mic body -->
      <rect x="8" y="2" width="8" height="12" rx="4"
            stroke="#7F77DD" stroke-width="1.5" fill="none"/>
      <!-- Mic arc -->
      <path d="M4,11 Q4,18 12,18 Q20,18 20,11"
            stroke="#7F77DD" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <!-- Stand -->
      <line x1="12" y1="18" x2="12" y2="22" stroke="#7F77DD" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="8"  y1="22" x2="16" y2="22" stroke="#7F77DD" stroke-width="1.5" stroke-linecap="round"/>
      <!-- Sound waves -->
      <path d="M2,8 Q1,12 2,16"
            stroke="#7F77DD" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.5"/>
      <path d="M22,8 Q23,12 22,16"
            stroke="#7F77DD" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.5"/>
    </g>
    <text x="50" y="118" class="tile-label">voice check-in</text>
  </g>

  <!-- 7. Milestone / Celebration -->
  <g transform="translate(760, 40)">
    <rect width="100" height="100" rx="20" fill="#FAEEDA"/>
    <g transform="translate(50,50) scale(1.8) translate(-12,-12)">
      <!-- Star -->
      <polygon points="12,2 14.5,9 22,9 16,14 18.5,21 12,17 5.5,21 8,14 2,9 9.5,9"
               stroke="#EF9F27" stroke-width="1.3" fill="#EF9F27" fill-opacity="0.25"
               stroke-linejoin="round"/>
      <!-- Sparkle top right -->
      <line x1="19" y1="3" x2="19" y2="6" stroke="#FAC775" stroke-width="1.2" stroke-linecap="round"/>
      <line x1="17.5" y1="4.5" x2="20.5" y2="4.5" stroke="#FAC775" stroke-width="1.2" stroke-linecap="round"/>
      <!-- Sparkle bottom left -->
      <line x1="4"  y1="17" x2="4"  y2="19" stroke="#FAC775" stroke-width="1" stroke-linecap="round"/>
      <line x1="3"  y1="18" x2="5"  y2="18" stroke="#FAC775" stroke-width="1" stroke-linecap="round"/>
    </g>
    <text x="50" y="118" class="tile-label">milestone</text>
  </g>

  <!-- === ROW 2 === -->

  <!-- 8. Community / Sisterhood -->
  <g transform="translate(40, 200)">
    <rect width="100" height="100" rx="20" fill="#FBEAF0"/>
    <g transform="translate(50,50) scale(1.8) translate(-12,-12)">
      <!-- Three people -->
      <circle cx="6"  cy="7"  r="3" stroke="#D4537E" stroke-width="1.3" fill="none"/>
      <circle cx="18" cy="7"  r="3" stroke="#D4537E" stroke-width="1.3" fill="none"/>
      <circle cx="12" cy="5"  r="3.5" fill="#D4537E" fill-opacity="0.2" stroke="#D4537E" stroke-width="1.5"/>
      <!-- Bodies -->
      <path d="M2,20 Q2,13 6,13 Q8,13 9,14" stroke="#D4537E" stroke-width="1.3" fill="none" stroke-linecap="round"/>
      <path d="M22,20 Q22,13 18,13 Q16,13 15,14" stroke="#D4537E" stroke-width="1.3" fill="none" stroke-linecap="round"/>
      <path d="M7,22 Q7,14 12,14 Q17,14 17,22" stroke="#D4537E" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    </g>
    <text x="50" y="318" class="tile-label">sisterhood</text>
  </g>

  <!-- 9. Energy / Metabolic Sync -->
  <g transform="translate(160, 200)">
    <rect width="100" height="100" rx="20" fill="#FAEEDA"/>
    <g transform="translate(50,50) scale(1.8) translate(-12,-12)">
      <!-- Lightning bolt -->
      <path d="M14,2 L7,13 L12,13 L10,22 L17,11 L12,11 Z"
            stroke="#EF9F27" stroke-width="1.4" fill="#EF9F27" fill-opacity="0.2"
            stroke-linejoin="round" stroke-linecap="round"/>
    </g>
    <text x="50" y="318" class="tile-label">energy sync</text>
  </g>

  <!-- 10. Grocery / Inventory -->
  <g transform="translate(280, 200)">
    <rect width="100" height="100" rx="20" fill="#EAF3DE"/>
    <g transform="translate(50,50) scale(1.8) translate(-12,-12)">
      <!-- Basket -->
      <path d="M4,9 L20,9 L18,20 Q18,22 12,22 Q6,22 6,20 Z"
            stroke="#639922" stroke-width="1.4" fill="#639922" fill-opacity="0.15"
            stroke-linejoin="round"/>
      <!-- Handle -->
      <path d="M7,9 Q7,4 12,4 Q17,4 17,9"
            stroke="#639922" stroke-width="1.4" fill="none" stroke-linecap="round"/>
      <!-- Items inside -->
      <line x1="9"  y1="13" x2="9"  y2="18" stroke="#639922" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
      <line x1="12" y1="13" x2="12" y2="18" stroke="#639922" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
      <line x1="15" y1="13" x2="15" y2="18" stroke="#639922" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
    </g>
    <text x="50" y="318" class="tile-label">grocery plan</text>
  </g>

  <!-- 11. Blog / Case Studies -->
  <g transform="translate(400, 200)">
    <rect width="100" height="100" rx="20" fill="#E1F5EE"/>
    <g transform="translate(50,50) scale(1.8) translate(-12,-12)">
      <!-- Document -->
      <rect x="4" y="2" width="16" height="20" rx="2"
            stroke="#1D9E75" stroke-width="1.4" fill="none"/>
      <!-- Lines of text -->
      <line x1="7"  y1="7"  x2="17" y2="7"  stroke="#1D9E75" stroke-width="1.2" stroke-linecap="round"/>
      <line x1="7"  y1="11" x2="17" y2="11" stroke="#1D9E75" stroke-width="1.2" stroke-linecap="round"/>
      <line x1="7"  y1="15" x2="14" y2="15" stroke="#1D9E75" stroke-width="1.2" stroke-linecap="round"/>
      <!-- Small chart at bottom -->
      <polyline points="7,20 10,17 13,19 17,16"
                stroke="#EF9F27" stroke-width="1.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <text x="50" y="318" class="tile-label">case studies</text>
  </g>

  <!-- 12. Homeopathy / Constitution -->
  <g transform="translate(520, 200)">
    <rect width="100" height="100" rx="20" fill="#EEEDFE"/>
    <g transform="translate(50,50) scale(1.8) translate(-12,-12)">
      <!-- Mortar and pestle -->
      <ellipse cx="12" cy="18" rx="8" ry="3.5"
               stroke="#7F77DD" stroke-width="1.4" fill="#7F77DD" fill-opacity="0.15"/>
      <path d="M5,18 Q5,10 12,10 Q19,10 19,18"
            stroke="#7F77DD" stroke-width="1.4" fill="none"/>
      <!-- Pestle -->
      <line x1="16" y1="6" x2="10" y2="14" stroke="#7F77DD" stroke-width="1.6" stroke-linecap="round"/>
      <circle cx="16.5" cy="5.5" r="2" fill="#7F77DD" opacity="0.4"/>
      <!-- Small circles inside — remedy globules -->
      <circle cx="10" cy="16" r="1" fill="#7F77DD" opacity="0.6"/>
      <circle cx="13" cy="15" r="1" fill="#7F77DD" opacity="0.6"/>
      <circle cx="15" cy="16.5" r="1" fill="#7F77DD" opacity="0.6"/>
    </g>
    <text x="50" y="318" class="tile-label">homeopathy</text>
  </g>

  <!-- 13. Graduate / Bye -->
  <g transform="translate(640, 200)">
    <rect width="100" height="100" rx="20" fill="#E1F5EE"/>
    <g transform="translate(50,50) scale(1.8) translate(-12,-12)">
      <!-- Graduation cap -->
      <polygon points="12,3 22,8 12,13 2,8" fill="#1D9E75" fill-opacity="0.2"
               stroke="#1D9E75" stroke-width="1.3" stroke-linejoin="round"/>
      <!-- Cap top flat -->
      <rect x="9" y="2" width="6" height="2" rx="1" fill="#1D9E75" opacity="0.5"/>
      <!-- Tassel -->
      <line x1="22" y1="8" x2="22" y2="15" stroke="#1D9E75" stroke-width="1.4" stroke-linecap="round"/>
      <line x1="22" y1="15" x2="20" y2="18" stroke="#EF9F27" stroke-width="1.2" stroke-linecap="round"/>
      <circle cx="20" cy="19" r="1.5" fill="#EF9F27"/>
      <!-- Body below -->
      <path d="M6,10 L6,17 Q6,21 12,21 Q18,21 18,17 L18,10"
            stroke="#1D9E75" stroke-width="1.3" fill="none" stroke-linecap="round"/>
    </g>
    <text x="50" y="318" class="tile-label">graduate</text>
  </g>

  <!-- 14. Herbal / Unani -->
  <g transform="translate(760, 200)">
    <rect width="100" height="100" rx="20" fill="#EAF3DE"/>
    <g transform="translate(50,50) scale(1.8) translate(-12,-12)">
      <!-- Leaf -->
      <path d="M12,20 Q4,14 5,8 Q8,2 12,3 Q16,2 19,8 Q20,14 12,20 Z"
            stroke="#3B6D11" stroke-width="1.4" fill="#3B6D11" fill-opacity="0.18"/>
      <!-- Leaf vein -->
      <line x1="12" y1="20" x2="12" y2="4"
            stroke="#3B6D11" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
      <!-- Side veins -->
      <line x1="12" y1="9"  x2="8"  y2="7"  stroke="#3B6D11" stroke-width="0.8" stroke-linecap="round" opacity="0.4"/>
      <line x1="12" y1="12" x2="8"  y2="11" stroke="#3B6D11" stroke-width="0.8" stroke-linecap="round" opacity="0.4"/>
      <line x1="12" y1="9"  x2="16" y2="7"  stroke="#3B6D11" stroke-width="0.8" stroke-linecap="round" opacity="0.4"/>
      <line x1="12" y1="12" x2="16" y2="11" stroke="#3B6D11" stroke-width="0.8" stroke-linecap="round" opacity="0.4"/>
      <!-- Stem -->
      <line x1="12" y1="20" x2="12" y2="23" stroke="#3B6D11" stroke-width="1.2" stroke-linecap="round"/>
    </g>
    <text x="50" y="318" class="tile-label">herbal &amp; Unani</text>
  </g>

</svg>
