<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 160" width="560" height="160">
  <title>Mauri — primary logo lockup</title>
  <desc>Mauri primary horizontal logo: spine of life mark on the left, wordmark and tagline on the right. For use on light backgrounds.</desc>

  <!-- Mark — scaled down for lockup -->
  <g transform="translate(20, 8) scale(0.46)">
    <line x1="100" y1="20" x2="100" y2="272"
          stroke="#1D9E75" stroke-width="3.5" stroke-linecap="round"/>
    <path d="M100,52 Q148,34 162,14"
          stroke="#1D9E75" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M100,52 Q56,36 44,16"
          stroke="#1D9E75" stroke-width="1.8" fill="none" stroke-linecap="round" opacity="0.45"/>
    <path d="M100,98 Q152,76 170,52"
          stroke="#1D9E75" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M100,98 Q50,78 34,54"
          stroke="#1D9E75" stroke-width="1.8" fill="none" stroke-linecap="round" opacity="0.4"/>
    <path d="M100,148 Q146,128 158,108"
          stroke="#7F77DD" stroke-width="2.6" fill="none" stroke-linecap="round"/>
    <path d="M100,148 Q56,130 46,110"
          stroke="#7F77DD" stroke-width="1.6" fill="none" stroke-linecap="round" opacity="0.5"/>
    <path d="M100,192 Q136,178 144,164"
          stroke="#7F77DD" stroke-width="2.2" fill="none" stroke-linecap="round" opacity="0.78"/>
    <path d="M100,192 Q66,179 60,166"
          stroke="#7F77DD" stroke-width="1.3" fill="none" stroke-linecap="round" opacity="0.42"/>
    <path d="M100,232 Q124,222 128,212"
          stroke="#7F77DD" stroke-width="1.6" fill="none" stroke-linecap="round" opacity="0.55"/>
    <path d="M100,256 Q116,249 118,240"
          stroke="#EF9F27" stroke-width="1.6" fill="none" stroke-linecap="round" opacity="0.72"/>
    <path d="M100,256 Q86,250 84,242"
          stroke="#EF9F27" stroke-width="1.1" fill="none" stroke-linecap="round" opacity="0.42"/>
    <circle cx="100" cy="284" r="18" fill="#1D9E75"/>
    <circle cx="100" cy="284" r="10" fill="white"/>
  </g>

  <!-- Divider -->
  <line x1="88" y1="24" x2="88" y2="136"
        stroke="#D3D1C7" stroke-width="0.8"/>

  <!-- Wordmark -->
  <text x="104" y="98"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="64"
        font-weight="400"
        letter-spacing="10"
        fill="#1D9E75">mauri</text>

  <!-- Tagline -->
  <text x="106" y="126"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif"
        font-size="13"
        font-weight="400"
        letter-spacing="3.5"
        fill="#888780">restore your life force</text>

  <!-- Domain -->
  <text x="106" y="148"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif"
        font-size="11"
        letter-spacing="1.5"
        fill="#B4B2A9">mauriora.app</text>
</svg>
